<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks list</title>
    <meta property="og:image" content="https://i.postimg.cc/jjFjZHrj/share.png">
    <link href="https://i.postimg.cc/7PCz8LBc/icon.png" rel="icon">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/form.css" rel="stylesheet">
    <link href="css/section.css" rel="stylesheet">
    <link href="css/task.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato&family=Merriweather:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="js/script.js"></script>
</head>

<body class="body">

    <main class="container">
        <header>
          <h1>List of tasks</h1>
        </header>
    
        <section class="section">
          <h2 class="section__header">Add new task</h2>
          <div class="section__form">
            <form class="form js-form">
              <input class="form__input js-newTask" placeholder="add your task here" autofocus>
              <button class="form__button">Add task</button>
            </form>
          </div>
        </section>
    
        <section class="section">
          <h2 class="section__header">List of tasks</h2>
    
          <div class="section__form">
            <ul class="tasks js-tasks">
              <li class="tasks__item js-tasks">
                <button class="tasks__button js-toggleDone">✔</button>
                <span class="tasks__content tasks__content--done"></span>
                <button class="tasks__button  js-remove">🗑</button>
              </li>
              <li class="tasks__item js-tasks">
                <button class="tasks__button  js-toggleDone">✔</button>
                <span class="tasks__content tasks__content--done"></span>
                <button class="tasks__button js-remove">🗑</button>
              </li>
            </ul>
          </div>
        </section>
    
      </main>
</body>

</html>
